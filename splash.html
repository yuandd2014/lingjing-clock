<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵境时钟 安装仪式</title>
  <link rel="stylesheet" href="css/splash.css">
</head>
<body>
  <div class="splash-stage" role="status" aria-live="polite">
    <div class="light-sweep" aria-hidden="true"></div>

    <div class="splash-mark" aria-hidden="true">灵</div>

    <h1 class="splash-title" id="splash-title">灵境时钟</h1>
    <p class="splash-version" id="splash-version">v1.2.0</p>

    <div class="splash-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="splash-progress-bar" id="splash-progress-bar"></div>
    </div>

    <p class="splash-hint" id="splash-hint">正在准备灵境…</p>
  </div>

  <script src="js/splash.js"></script>
</body>
</html>
